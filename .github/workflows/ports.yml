name: ports
on: [push, pull_request]
permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test JS port
        working-directory: ports/javascript
        run: node test.js

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build + test Go port
        working-directory: ports/go
        run: |
          go vet ./...
          go build -o /tmp/depgraph-go .
          go test ./...

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build + test Rust port
        working-directory: ports/rust
        run: |
          cargo build --release
          cargo test

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test shell port
        run: sh ports/shell/test.sh
